# Sepid Exchange — nginx reverse proxy (example)
#
# Install:
#   apt install nginx certbot python3-certbot-nginx
#   cp deploy/nginx-sepid.conf /etc/nginx/sites-available/sepid
#   ln -s /etc/nginx/sites-available/sepid /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d your-domain.example

upstream sepid_web_api {
    server 127.0.0.1:8100;
    keepalive 16;
}

upstream sepid_web_ui {
    server 127.0.0.1:3100;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example;

    client_max_body_size 12m;

    location /api/ {
        proxy_pass http://sepid_web_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://sepid_web_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
